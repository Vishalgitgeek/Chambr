<!DOCTYPE html>
<html>
<head>
    <title>Chambr</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pc6Q8c1qd7KGY0Oo6pGgKu+7Q+ie0+WVBp5Mp2v4x+1BXsLZfJgJ2nj5kHSgzU1O9NSxdHtb2XGj1wXb1RkvoQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --bg: #f6f7f8;
            --surface: #ffffff;
            --surface-soft: #fff5f5;
            --primary: #dc3545;
            --primary-dark: #b02a37;
            --border: #e9ecef;
            --text: #2b2b2b;
            --muted: #6c757d;
            --shadow: 0 18px 45px rgba(0,0,0,0.06);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
        }

        a {
            color: var(--primary);
        }

        a:hover {
            color: var(--primary-dark);
            text-decoration: none;
        }

        .navbar {
            min-height: 68px;
            background: var(--surface) !important;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        .navbar-brand {
            color: var(--primary) !important;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .nav-link {
            color: #495057 !important;
            font-weight: 500;
        }

        .nav-link:hover,
        .nav-link.active,
        .navbar-nav .dropdown-menu a.dropdown-item:hover {
            color: var(--primary) !important;
        }

        .container {
            max-width: 1180px;
        }

        .card,
        .room-card,
        .stat-card,
        .message-input-card,
        .participants-card,
        .post-card,
        .auth-prompt-card,
        .user-card {
            border: 1px solid var(--border);
            border-radius: 22px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .card-header,
        .section-header h2,
        .room-header,
        .hero-section {
            border-radius: 22px;
        }

        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(220,53,69,0.18);
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);
            box-shadow: 0 14px 30px rgba(220,53,69,0.22);
        }

        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }

        .btn-outline-primary:hover,
        .btn-outline-primary:focus {
            background-color: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .btn-dark,
        .btn-secondary {
            background: #f9fafb;
            color: #212529;
            border-color: #dee2e6;
        }

        .btn-dark:hover,
        .btn-secondary:hover {
            background: #eceeef;
            color: #212529;
        }

        .form-control,
        .form-select,
        textarea.form-control {
            border: 1px solid #dee2e6;
            border-radius: 14px;
            box-shadow: none;
            padding: 0.95rem 1rem;
        }

        .form-control:focus,
        .form-select:focus,
        textarea.form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.18rem rgba(220,53,69,0.15);
        }

        .bg-white-soft {
            background: #ffffff;
        }

        .hero-section {
            background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(255,235,237,0.75) 100%);
            border: 1px solid rgba(220,53,69,0.15);
            padding: 3rem 2rem;
        }

        .hero-section h1,
        .room-header h1,
        .section-header h2 {
            letter-spacing: -0.02em;
        }

        .rounded-3 {
            border-radius: 1.75rem !important;
        }

        .section-header {
            padding: 0.5rem 0;
        }

        .section-header h2 {
            font-size: 1.7rem;
        }

        .badge.bg-light {
            background: #f8f9fa !important;
            color: #545b62 !important;
        }

        .text-muted {
            color: var(--muted) !important;
        }

        .card-body {
            padding: 1.75rem;
        }

        .form-label {
            font-weight: 600;
        }

        .rounded-circle {
            object-fit: cover;
        }

        @media (max-width: 768px) {
            .hero-section {
                padding: 2rem 1.25rem;
            }

            .card-body {
                padding: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Chambr</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                {% if user.is_authenticated %}
                    <ul class="navbar-nav">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle text-capitalize" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                {{ user.username }}
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                                <!-- Add profile page link here if needed -->
                                <li><a class="dropdown-item" href="{% url 'logout' %}">Logout</a></li>
                            </ul>
                        </li>
                    </ul>
                {% else %}
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'register' %}">Register</a>
                        </li>
                    </ul>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS (required for dropdown and toggler) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
